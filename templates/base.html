<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title or "AI Pen & Paper" }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="container nav-wrapper">
            <a class="logo" href="{{ url_for('index') }}">AI Pen & Paper</a>

            <nav class="main-nav">
                <a href="{{ url_for('index') }}">Home</a>
                <a href="{{ url_for('characters') }}">My Characters</a>
                <a href="{{ url_for('world') }}">World</a>
                <a href="{{ url_for('community') }}">Community</a>
                <a href="{{ url_for('support') }}">Support</a>
                {% if session.get("user_id") %}
                    <a href="{{ url_for('logout') }}">Logout</a>
                {% else %}
                    <a href="{{ url_for('login') }}">Login</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="container main-content">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
